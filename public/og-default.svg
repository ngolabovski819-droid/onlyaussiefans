<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#7c3aed" opacity="0.07"/>
  <circle cx="1100" cy="530" r="250" fill="#ec4899" opacity="0.07"/>
  <!-- Logo text -->
  <text x="600" y="280" font-family="sans-serif" font-weight="bold" font-size="80" fill="url(#txt)" text-anchor="middle">OnlyAussieFans</text>
  <!-- Tagline -->
  <text x="600" y="360" font-family="sans-serif" font-size="32" fill="#8888aa" text-anchor="middle">Find the Best Australian OnlyFans Creators</text>
  <!-- Flag colours bar -->
  <rect x="0" y="600" width="450" height="30" fill="#00008B"/>
  <rect x="450" y="600" width="300" height="30" fill="#FFFFFF"/>
  <rect x="750" y="600" width="450" height="30" fill="#FF0000"/>
</svg>
